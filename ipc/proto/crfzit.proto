syntax = "proto3";

package crfzit.ipc;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option cc_generic_services = true;
option java_package = "com.crfzit.ipc";
option java_multiple_files = true;

// --- Enums ---

// 冻结模式
enum FreezeMode {
  V2_FREEZE = 0;    // cgroup v2 freezer (推荐)
  V1_FREEZE = 1;    // cgroup v1 freezer (旧版内核备用)
  SIGSTOP = 2;      // SIGSTOP信号
  KILL = 3;         // 杀死进程
}

// 网络策略
enum NetworkPolicy {
  NET_ALLOW_ALL = 0;
  NET_WIFI_ONLY = 1;
  NET_BLOCK_ALL = 2;
}

// OOM Score 优先级
enum OomPriority {
  OOM_HIGH = 0;     // 不易被杀
  OOM_MEDIUM = 1;   // 默认
  OOM_LOW = 2;      // 容易被杀
}

// 前台策略
enum ForegroundPolicy {
  STRICT = 0;       // 仅顶层可见Activity
  LENIENT = 1;      // 包含前台服务等
}

// 仪表盘使用的聚合应用状态
enum AppDisplayStatus {
  FOREGROUND = 0;         // 前台
  BACKGROUND_ACTIVE = 1;  // 后台活动 (因豁免策略)
  FROZEN = 2;             // 已冻结
  KILLED = 3;             // 已杀死
  PENDING_FREEZE = 4;     // 等待冻结
}

// 事件来源
enum EventSource {
    SOURCE_UNKNOWN = 0;
    CRFZIT_CONSOLE = 1;
    CRFZIT_OBSERVER = 2;
    CRFZITD_INTERNAL = 3;
}

// 事件类型
enum EventType {
    TYPE_UNKNOWN = 0;
    // Observer a-reportable events
    BROADCAST_RECEIVED = 1;
    WAKELOCK_ACQUIRED = 2;
    ALARM_TRIGGERED = 3;
    // Internal & Console events
    APP_CONFIG_CHANGED = 10;
    SYSTEM_BOOT_COMPLETED = 11;
    SCREEN_ON = 12;
    SCREEN_OFF = 13;
    FORCE_FREEZE_ALL = 14;
}


// --- Messages ---

// 单个应用的完整配置
message AppConfig {
  string package_name = 1;
  FreezeMode freeze_mode = 2;
  NetworkPolicy network_policy = 3;
  OomPriority oom_priority = 4;
  ForegroundPolicy foreground_policy = 5;
  bool lenient_allow_playback = 6;
  bool lenient_allow_notification = 7;
  bool lenient_allow_network = 8;
  bool is_whitelisted = 9;
  bool allow_fcm_wakeup = 10;
}

// 仪表盘上单个应用的运行时状态
message AppRuntimeState {
  string package_name = 1;
  AppDisplayStatus display_status = 2;
  FreezeMode active_freeze_mode = 3; // 如果是FROZEN，指明具体方式
  int64 memory_usage_kb = 4;
  float cpu_usage_percent = 5;
  int32 pending_freeze_sec = 6;      // 如果是PENDING_FREEZE，剩余秒数

  // --- 用于UI状态指示器的布尔标志 ---
  bool is_whitelisted = 10;
  bool has_playback = 11;
  bool has_notification = 12;
  bool has_network_activity = 13;
  bool is_foreground = 14;
}

// 包装AppRuntimeState列表，用于流式传输
message ActiveAppsStateList {
    repeated AppRuntimeState apps = 1;
}

// 全局系统状态
message GlobalStats {
  float total_cpu_usage_percent = 1;
  int64 total_mem_kb = 2;
  int64 avail_mem_kb = 3;
  int64 network_speed_down_bps = 4; // bits per second
  int64 network_speed_up_bps = 5;   // bits per second
  string active_profile_name = 6;
}

// 事件日志
message EventLog {
  google.protobuf.Timestamp timestamp = 1;
  string event_description = 2;
}

// 从Observer上报的Framework事件
message FrameworkEvent {
    EventSource source = 1;
    EventType type = 2;
    google.protobuf.Timestamp timestamp = 3;
    int32 uid = 4;
    string package_name = 5;
    map<string, string> extra_data = 6; // e.g., "action" -> "android.intent.action.BATTERY_CHANGED"
}

// --- Services ---

// 配置服务 (UI -> Daemon)
service ConfigService {
  rpc SetAppConfig(AppConfig) returns (google.protobuf.Empty);
  rpc GetAllConfigs(google.protobuf.Empty) returns (stream AppConfig);
  rpc GetAppConfig(AppConfig) returns (AppConfig);
}

// 仪表盘数据服务 (Daemon -> UI)
service DashboardService {
  rpc StreamGlobalStats(google.protobuf.Empty) returns (stream GlobalStats);
  rpc StreamActiveAppsState(google.protobuf.Empty) returns (stream ActiveAppsStateList);
  rpc GetEventLogs(google.protobuf.Empty) returns (stream EventLog);
}

// 内部系统服务 (Observer -> Daemon)
service SystemService {
  rpc ReportFrameworkEvent(FrameworkEvent) returns (google.protobuf.Empty);
}